name: Deploy to Hostinger

on:
  push:
    branches: [main]
  workflow_dispatch: # allows manual deploy from the Actions tab

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Assemble deploy folder
        run: |
          mkdir -p deploy/api
          cp -r dist/. deploy/
          cp api/index.php api/.htaccess deploy/api/
          # NOTE: api/config.php is intentionally NOT deployed —
          # the copy on the server (with real DB credentials) stays untouched.

      - name: Upload to Hostinger via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: deploy/
          server-dir: public_html/
          exclude: |
            **/config.php
